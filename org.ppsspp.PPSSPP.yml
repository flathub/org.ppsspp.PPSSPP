app-id: org.ppsspp.PPSSPP
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
rename-icon: ppsspp
rename-desktop-file: PPSSPPSDL.desktop
command: PPSSPPSDL
finish-args:
  - --device=all
  - --filesystem=host:ro
  - --socket=pulseaudio
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --share=network
  - --talk-name=org.freedesktop.ScreenSaver
  - --env=SDL_VIDEO_X11_WMCLASS=org.ppsspp.PPSSPP
  - --env=SDL_VIDEO_WAYLAND_WMCLASS=org.ppsspp.PPSSPP
  # required for Gamescope on Steam Deck
  - --filesystem=xdg-run/gamescope-0:ro
modules:
  - shared-modules/glu/glu-9.json
  - shared-modules/glew/glew.json

  # The runtime provides the SDL2-compat module that is a bit brokenish.
  # We are intentionally compiling the SDL2 module to fix some issues.
  # See: Pull Request #96
  - name: sdl2
    buildsystem: simple
    config-opts:
      - ac_cv_path_FREETYPE_CONFIG=pkg-config freetype2
      - --disable-static
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        tag: release-2.32.10
        commit: 5d249570393f7a37e037abf22cd6012a4cc56a71
    build-commands:
      - ./autogen.sh
      - ./configure --prefix=${FLATPAK_DEST}/
      - make
      - make install

  - name: ppsspp
    buildsystem: cmake
    config-opts:
      - -DUSE_SYSTEM_FFMPEG=OFF
      - -DUSE_SYSTEM_LIBZIP=ON
      - -DUSE_SYSTEM_ZSTD=ON

      - -DUSE_WAYLAND_WSI=ON
      - -DUSING_QT_UI=OFF

      - -DBUILD_TESTING=OFF
      - -DOpenGL_GL_PREFERENCE=GLVND
    build-options:
      arch:
        aarch64:
          config-opts:
            - -DUSING_EGL=ON
            - -DUSING_GLES2=ON
    post-install:
      - desktop-file-edit --set-name=PPSSPP ${FLATPAK_DEST}/share/applications/PPSSPPSDL.desktop
      - install -Dm644 icons/icon-512.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/ppsspp.svg
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo
    cleanup:
      - /share/ppsspp/assets/lang/README.md
    sources:
      - type: git
        url: &ppsspp-url https://github.com/hrydgard/ppsspp.git
        tag: v1.20.2
        commit: afbc66a318b86432642b532c575241f3716642ef
        x-checker-data:
          type: json
          url: https://api.github.com/repos/hrydgard/ppsspp/releases/latest
          version-query: .tag_name | sub("^v"; "")
          tag-query: .tag_name
          timestamp-query: .published_at

      - type: file
        path: org.ppsspp.PPSSPP.metainfo.xml
